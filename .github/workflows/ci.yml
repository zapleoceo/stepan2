name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    # Self-hosted runner on the Hetzner box (free minutes forever; the repo stays private —
    # its git history carries a prod DB dump, so it must never go public). The job runs in a
    # clean python container, not on the host, so prod services are untouched.
    runs-on: [self-hosted, hetzner]
    container: python:3.12-slim
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Tests
        run: pytest -q
