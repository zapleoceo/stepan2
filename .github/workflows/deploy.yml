name: Deploy stepan2 to Hetzner

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "migrations/**"
      - "infra/**"
      - "Dockerfile"
      - "pyproject.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-stepan2
  cancel-in-progress: false

env:
  REMOTE_DIR: /var/www/stepan2

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HOST: ${{ secrets.HETZNER_HOST }}
      PORT: ${{ secrets.HETZNER_PORT || '9617' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Rsync repo to server
        run: |
          rsync -az --delete \
            -e "ssh -p $PORT -o BatchMode=yes -o ConnectTimeout=15" \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude 'infra/.env' \
            ./ "root@${HOST}:${REMOTE_DIR}/"

      - name: Build and start core services (worker stays off)
        run: |
          ssh -p "$PORT" -o BatchMode=yes -o ConnectTimeout=15 "root@${HOST}" \
            "set -e; cd ${REMOTE_DIR}/infra \
             && docker compose build api \
             && docker compose up -d postgres redis api"

      - name: Apply migrations
        run: |
          ssh -p "$PORT" -o BatchMode=yes -o ConnectTimeout=15 "root@${HOST}" \
            "set -e; cd ${REMOTE_DIR}/infra \
             && docker compose run --rm api alembic upgrade head"

      - name: Refresh worker (only if already running)
        run: |
          ssh -p "$PORT" -o BatchMode=yes -o ConnectTimeout=15 "root@${HOST}" \
            "set -e; cd ${REMOTE_DIR}/infra \
             && if [ -n \"\$(docker ps -q -f name=stepan2-worker -f status=running)\" ]; then \
                  echo 'worker running → rebuild + restart on new code'; \
                  docker compose --profile worker build worker \
                  && docker compose --profile worker up -d --force-recreate worker; \
                else echo 'worker off (profile-gated) → left untouched'; fi"

      - name: Healthcheck
        run: |
          ssh -p "$PORT" -o BatchMode=yes -o ConnectTimeout=15 "root@${HOST}" \
            "set -e; for i in \$(seq 1 10); do \
               curl -fsS http://localhost:8020/healthz && exit 0; \
               echo 'waiting for api…'; sleep 3; \
             done; echo 'healthcheck failed'; exit 1"
