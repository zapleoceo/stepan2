name: Deploy stepan2 to Hetzner

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "migrations/**"
      - "infra/**"
      - "Dockerfile"
      - "alembic.ini"
      - "pyproject.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-stepan2
  cancel-in-progress: false

env:
  REMOTE_DIR: /var/www/stepan2

jobs:
  test:
    # Same self-hosted runner as ci.yml — free minutes, prod untouched (containered job).
    runs-on: [self-hosted, hetzner]
    container: python:3.12-slim
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Tests
        run: pytest -q

  deploy:
    needs: test
    # The runner LIVES on the deploy target — no SSH hop, no secrets: checkout → local rsync
    # → docker compose. Same steps as the old remote flow, minus the transport.
    runs-on: [self-hosted, hetzner]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Rsync repo into the deploy dir
        run: |
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude 'infra/.env' \
            --exclude 'db_dumps' \
            --exclude 'tests' \
            --exclude '.pytest_cache' \
            --exclude '.ruff_cache' \
            --exclude '.coverage' \
            ./ "${REMOTE_DIR}/"

      - name: Build image and bring up datastores
        run: |
          set -e; cd ${REMOTE_DIR}/infra
          docker compose build api
          docker compose up -d postgres redis

      - name: Apply migrations (before the new API serves)
        run: |
          # Migrate with the NEW image via a one-off container while the OLD api container is
          # still serving — avoids the new-code-vs-old-schema window. Rollback on a bad
          # release: revert the commit and re-deploy (images aren't registry-tagged here).
          set -e; cd ${REMOTE_DIR}/infra
          docker compose run --rm api alembic upgrade head

      - name: Recreate API on the new code (schema already migrated)
        run: |
          set -e; cd ${REMOTE_DIR}/infra
          docker compose up -d api

      - name: Refresh worker (only if already running)
        run: |
          set -e; cd ${REMOTE_DIR}/infra
          if [ -n "$(docker ps -q -f name=stepan2-worker -f status=running)" ]; then
            echo 'worker running → rebuild + restart on new code'
            docker compose --profile worker build worker
            docker compose --profile worker up -d --force-recreate worker
          else
            echo 'worker off (profile-gated) → left untouched'
          fi

      - name: Healthcheck
        run: |
          set -e
          for i in $(seq 1 10); do
            curl -fsS http://localhost:8020/healthz && exit 0
            echo 'waiting for api…'; sleep 3
          done
          echo 'healthcheck failed'; exit 1
