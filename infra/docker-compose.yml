name: stepan2

# Изолировано от Stepan-1: свои порты (5435/6380/8020), свой volume, свои контейнеры.
# Воркер под profile "worker" → НЕ стартует по умолчанию (не конфликтуем со Stepan-1).
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stepan2-postgres
    environment:
      POSTGRES_USER: stepan2
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: stepan2
    volumes:
      - stepan2_pgdata:/var/lib/postgresql/data
    # Внешний порт не публикуем — БД доступна контейнерам по сети (postgres:5432).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stepan2 -d stepan2"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stepan2-redis
    # Внешний порт не публикуем — Redis доступен контейнерам по сети (redis:6379).
    restart: unless-stopped

  api:
    build: ..
    container_name: stepan2-api
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      STEPAN2_DATABASE_URL: postgresql+asyncpg://stepan2:${POSTGRES_PASSWORD}@postgres:5432/stepan2
      STEPAN2_REDIS_URL: redis://redis:6379
      STEPAN2_BROKER_URL: ${BROKER_URL:-}
      STEPAN2_BROKER_PROJECT_KEY: ${BROKER_PROJECT_KEY:-}
      STEPAN2_SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      STEPAN2_BOOTSTRAP_SUPER_ADMIN: ${BOOTSTRAP_SUPER_ADMIN:-0}
      STEPAN2_IG_PROXY: ${IG_PROXY:-}
      STEPAN2_TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      STEPAN2_AUTH_ENABLED: ${AUTH_ENABLED:-false}
      STEPAN2_SESSION_SECRET: ${SESSION_SECRET:-}
      STEPAN2_TG_LOGIN_BOT_USERNAME: ${TG_LOGIN_BOT_USERNAME:-}
    ports:
      - "127.0.0.1:8020:8000"
    restart: unless-stopped

  # Воркер на старте ВЫКЛЮЧЕН: только `docker compose --profile worker up` запустит его.
  worker:
    build: ..
    container_name: stepan2-worker
    profiles: ["worker"]
    command: ["arq", "app.worker.main.WorkerSettings"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
    environment:
      STEPAN2_DATABASE_URL: postgresql+asyncpg://stepan2:${POSTGRES_PASSWORD}@postgres:5432/stepan2
      STEPAN2_REDIS_URL: redis://redis:6379
      STEPAN2_BROKER_URL: ${BROKER_URL:-}
      STEPAN2_BROKER_PROJECT_KEY: ${BROKER_PROJECT_KEY:-}
      STEPAN2_SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      STEPAN2_IG_PROXY: ${IG_PROXY:-}
    restart: unless-stopped

volumes:
  stepan2_pgdata:
    driver: local
